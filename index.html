    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #050a07;
        }

        body { 
            background-image: 
                radial-gradient(circle at 50% -20%, #124d2d, transparent),
                radial-gradient(circle at 0% 100%, #0a2012, transparent);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #fff;
        }

        .main-wrapper {
            width: 100%; 
            height: 100%; 
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            text-align: center;
        }

        .top-brand-small {
            font-size: 0.65rem;
            font-weight: 800;
            color: #25d366;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .call-icon-main {
            font-size: 3.2rem;
            color: #fff;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.15));
            margin-top: 5px;
        }

        .instruction {
            font-size: 1rem;
            font-weight: 700;
            margin-top: 5px;
            color: #e0e0e0;
        }

        .scroll-icon {
            font-size: 1.4rem;
            color: #25d366;
            margin: 5px 0;
            animation: moveDown 1.2s infinite ease-in-out;
        }

        @keyframes moveDown {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(8px); opacity: 1; }
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-item {
            display: flex; 
            align-items: center;
            padding: 14px 16px;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .link-item i { 
            font-size: 1.6rem; 
            margin-left: 10px; 
            animation: iconShake 2.5s infinite;
        }

        @keyframes iconShake {
            0%, 80%, 100% { transform: rotate(0); }
            85% { transform: rotate(8deg); }
            90% { transform: rotate(-8deg); }
            95% { transform: rotate(8deg); }
        }

        .whatsapp-btn { border-right: 3px solid #25d366; }
        .phone-btn { border-right: 3px solid #007bff; }

        .link-item span { flex-grow: 1; text-align: right; }
        .link-item small { display: block; font-size: 0.8rem; opacity: 0.7; direction: ltr; font-family: sans-serif; }

        /* بەشی خوارەوە - بچوککراوەتەوە */
        .footer-section {
            padding: 8px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            text-decoration: none;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 5px;
        }

        .footer-brand { 
            font-size: 0.9rem; 
            font-weight: 800; 
            color: #fff;
            margin-bottom: 1px;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .footer-slogan { 
            font-size: 0.65rem; 
            color: #888; 
            margin-bottom: 2px;
        }

        .contact-us-text {
            font-size: 0.55rem;
            font-weight: 700;
            color: #25d366;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="top-brand-small">Kurd Agency</div>

        <div class="header-section">
            <div class="call-icon-main"><i class="fas fa-headset"></i></div>
            <p class="instruction">ڕێگاکانی پەیوەندی</p>
            <div class="scroll-icon"><i class="fas fa-chevron-down"></i></div>
        </div>

        <div class="link-container">
            <a href="https://wa.me/9647715448119" class="link-item whatsapp-btn" onclick="ttq.track('Contact');">
                <i class="fab fa-whatsapp" style="color: #25d366;"></i> 
                <span>وەتسئەپ <small>0771 544 8119</small></span>
            </a>

            <a href="tel:07715448119" class="link-item phone-btn" onclick="ttq.track('Contact');">
                <i class="fas fa-phone-alt" style="color: #007bff;"></i> 
                <span>پەیوەندی تەلەفۆنی <small>0771 544 8119</small></span>
            </a>
        </div>

        <a href="https://api.whatsapp.com/send?phone=9647510386174" class="footer-section" onclick="ttq.track('Contact');">
            <div class="footer-brand">KURD AGENCY</div>
            <p class="footer-slogan">گەورەکردنی کارەکەت لەگەڵ ئێمە ئاسانە</p>
            <div class="contact-us-text">Contact us</div>
        </a>
    </div>

</body>
</html>
